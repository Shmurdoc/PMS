# ═══════════════════════════════════════════════════════════════════════
#  SAFARIstack PMS — CI Pipeline
#  Triggers: Push to main/develop, PRs to main
#  Stages: Build → Unit Tests → Integration Tests → Docker Build
# ═══════════════════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  DOTNET_VERSION: "9.0.x"
  SOLUTION_PATH: "backend/SAFARIstack.sln"

jobs:
  # ─── Build & Unit Tests ─────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SAFARIstack.sln

      - name: Build
        run: dotnet build SAFARIstack.sln --no-restore -c Release /warnaserror

      - name: Run Unit Tests
        run: |
          dotnet test tests/SAFARIstack.Tests.Unit/SAFARIstack.Tests.Unit.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory TestResults

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: backend/TestResults/*.trx

  # ─── Integration Tests (requires PostgreSQL) ────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: safaristack_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SAFARIstack.sln

      - name: Build
        run: dotnet build SAFARIstack.sln --no-restore -c Release

      - name: Run Integration Tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=safaristack_test;Username=postgres;Password=test_password;Trust Server Certificate=true"
          SAFARISTACK_JWT_SECRET: "ci-pipeline-test-secret-minimum-32-characters-long"
        run: |
          dotnet test tests/SAFARIstack.Tests.Integration/SAFARIstack.Tests.Integration.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory TestResults

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: backend/TestResults/*.trx

  # ─── Docker Build (verify image builds successfully) ────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t safaristack-api:${{ github.sha }} \
            -t safaristack-api:latest \
            .

      - name: Verify Image
        run: |
          docker image inspect safaristack-api:latest
          echo "Image size: $(docker image inspect safaristack-api:latest --format='{{.Size}}' | numfmt --to=iec-i)"
